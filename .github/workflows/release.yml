name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Release
  id-token: write   # OIDC token for PyPI Trusted Publishing

jobs:
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only runs when the repository has PyPI Trusted Publishing configured.
    # Set PYPI_ENABLED=true in GitHub repository variables to activate.
    if: vars.PYPI_ENABLED == 'true'
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # One-time setup on pypi.org:
        #   Manage project → Publishing → Add trusted publisher:
        #     Owner:      rreboulleau
        #     Repository: telcontar
        #     Workflow:   release.yml
        #     Environment: pypi
        # Then set PYPI_ENABLED=true in GitHub → Settings → Variables → Actions.

site_name: Telcontar
site_description: Local AI document organizer — profile-driven, MCP-powered, GPT-5 backed
repo_url: https://github.com/rreboulleau/telcontar
repo_name: telcontar
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_submodules: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - How It Works: user-guide/how-it-works.md
    - Domain Profiles: user-guide/profiles.md
    - Approval Modes: user-guide/approval-modes.md
    - Outputs: user-guide/outputs.md
  - Reference:
    - MCP Tools: reference/mcp-tools.md
    - Profile Schema: reference/profile-schema.md
    - API:
      - server: reference/api/server.md
      - host: reference/api/host.md
      - config: reference/api/config.md
  - Developer Guide:
    - Architecture: developer/architecture.md
    - Module Reference: developer/modules.md
    - Adding a Profile: developer/adding-profiles.md
    - Contributing: developer/contributing.md
    - Internals — Plan Lifecycle: developer/internals/plan-lifecycle.md

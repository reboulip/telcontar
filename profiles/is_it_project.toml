# Profile #1 — IS/IT project document corpus.
#
# This is the first concrete domain profile for telcontar's profile-driven
# document-intelligence engine. It encodes the corporate IS/IT project use case
# (the original requirements) as data: the document-type vocabulary, the
# stakeholder/entity model, the extraction guardrails, naming, and outputs.
# Author a sibling .toml to adapt the engine to a different kind of corpus.

name = "is_it_project"
description = "Corporate IS/IT project document corpus (PMO-flavoured)."

# --- Document-type vocabulary -------------------------------------------------
# `record_document` validates each document's `type` against these ids.

[[document_types]]
id = "communication_formelle"
label = "Communication formelle"
description = "Note, courrier ou annonce officielle adressée aux parties prenantes."

[[document_types]]
id = "releve_de_decision"
label = "Relevé de décision"
description = "Compte rendu actant des décisions prises (instance, arbitrage)."

[[document_types]]
id = "document_de_travail"
label = "Document de travail"
description = "Livrable ou analyse en cours d'élaboration, non figé."

[[document_types]]
id = "support_copil"
label = "Support de comité de pilotage"
description = "Slides ou dossier présenté en COPIL."

[[document_types]]
id = "support_reunion"
label = "Support de réunion de travail"
description = "Support d'une réunion de travail opérationnelle."

[[document_types]]
id = "draft_officiel"
label = "Draft de document officiel"
description = "Version préparatoire d'un document destiné à être officialisé."

[[document_types]]
id = "notes"
label = "Notes"
description = "Notes personnelles ou de réunion, non structurées."

[[document_types]]
id = "echanges"
label = "Échanges"
description = "Fil d'e-mails ou de messages, correspondance."

[[document_types]]
id = "autre"
label = "Autres (préciser)"
description = "Type non couvert ci-dessus ; préciser dans les attributs."

# --- Entity / actor model -----------------------------------------------------
# Entities are stored as {name, role, kind}. `salient_cap` bounds the number of
# "main actors" surfaced for the project (the 4-5 personnes guardrail).

[entities]
kinds = ["person", "org"]
role_taxonomy = [
    "author",          # auteur principal du document
    "mentioned",       # personne mentionnée
    "sponsor",         # commanditaire / sponsor
    "chef_de_projet",  # chef de projet / PMO
    "metier",          # référent métier
    "prestataire",     # prestataire externe
    "autre",
]
salient_cap = 5

# --- Extraction guardrails ----------------------------------------------------
# Required fields must always be produced by the analysis pass; optional fields
# are "SI POSSIBLE" — leave null rather than inventing (e.g. the author garde-fou).

[extraction]
required = ["title", "summary", "provenance"]
optional = ["date", "author"]

# --- Synthesis ----------------------------------------------------------------
# Drives the project narrative the host composes into SUMMARY.md from the
# registry, the event journal, the knowledge graph and the ranked actors.

[synthesis]
template = "project_synthesis"
title = "Synthèse du projet"
sections = [
    "Vue d'ensemble — objet du corpus et état d'avancement général",
    "Acteurs principaux — qui intervient et à quel titre (rôles), d'après les acteurs classés (get_actors)",
    "Chronologie — les évènements clés datés (journal d'évènements), par ordre chronologique",
    "Documents clés — les livrables majeurs et leur apport (provenance)",
    "Doublons et versions — duplicats et versions modifiées repérés",
    "Points d'attention — risques, manques ou décisions en suspens, uniquement si étayés",
]
instructions = """\
Rédige SUMMARY.md en français comme une synthèse de projet structurée par les \
sections ci-dessus (une rubrique Markdown ## par section). Appuie-toi sur le \
registre (list_documents / get_registry), le journal d'évènements (list_events), \
le graphe de connaissance (get_graph) et les acteurs classés (get_actors). \
Écris en prose continue sous chaque titre ; n'invente jamais un fait absent des \
données et laisse une rubrique courte plutôt que de combler par des suppositions."""

# --- Naming -------------------------------------------------------------------

[naming]
convention = "snake_case_iso_dates"
instructions = """\
Use snake_case file names. Prefix with the document date as YYYY-MM-DD when known. \
Transliterate accented and special characters to ASCII. Keep the original extension. \
Drop redundant version suffixes when the date already disambiguates."""

# --- Output sinks -------------------------------------------------------------
# local_markdown is the only built-in sink for now; others are plugins (v0.8.0+).

[sinks]
default = ["local_markdown"]
